---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
  namespace: monitoring

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: fluent-bit
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    force: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false
    
  maxHistory: 1

  values:

    config:
      service: |-
        [SERVICE]
          daemon off
          flush {{ .Values.flush }}
          log_level {{ .Values.logLevel }}
          parsers_file /fluent-bit/etc/parsers.conf
          parsers_file /fluent-bit/etc/conf/custom_parsers.conf
          http_server on
          http_listen 0.0.0.0
          http_port {{ .Values.metricsPort }}
          health_check on

      inputs: |-
        [INPUT]
          name tail
          alias kubernetes
          path /var/log/containers/*.log
          db /var/log/flb_kube.db  # persists read position across restarts; stays small (rows = active containers, not log volume)
          parser containerd
          tag kubernetes.*
          skip_empty_lines on
          skip_long_lines on

        [INPUT]
          name              kubernetes_events
          tag               k8s_events
          kube_url          https://kubernetes.default.svc:443
          kube_ca_file      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kube_token_file   /var/run/secrets/kubernetes.io/serviceaccount/token

      filters: |-
        [FILTER]
          name    modify
          match   k8s_events
          rename  involvedObject.namespace namespace
          rename  involvedObject.kind      kind
          rename  involvedObject.name      object_name

        [FILTER]
          name kubernetes
          match kubernetes.*
          merge_log on
          keep_log on
          kube_tag_prefix kubernetes.var.log.containers.
          k8s-logging.parser on
          k8s-logging.exclude on
          namespace_labels off
          annotations off

        [FILTER]
          name nest
          match kubernetes.*
          wildcard pod_name
          operation lift
          nested_under kubernetes
          add_prefix kubernetes.

        [FILTER]
          name nest
          match kubernetes.*
          operation lift
          nested_under kubernetes.labels
          add_prefix kubernetes.pod_labels.

        [FILTER]
          name modify
          match kubernetes.*
          rename kubernetes.namespace_name kubernetes.pod_namespace
          rename kubernetes.pod_labels.app.kubernetes.io/name app
          rename kubernetes.pod_labels.app app
          rename kubernetes.pod_labels.k8s-app app

      customParsers: |-
        [PARSER]
          name containerd
          format regex
          regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
          time_key time
          time_format %Y-%m-%dT%H:%M:%S.%L%z

      outputs: |-
        [OUTPUT]
          Name http
          Match kubernetes.*
          host victoria-logs-server.monitoring.svc.cluster.local
          port 9428
          uri /insert/jsonline?_stream_fields=stream,kubernetes.pod_namespace,kubernetes.pod_name,app&_msg_field=log&_time_field=date
          format json_lines
          json_date_format iso8601
          compress gzip

        [OUTPUT]
          name              http
          match             k8s_events
          host              victoria-logs-server.monitoring.svc.cluster.local
          port              9428
          uri               /insert/jsonline?_stream_fields=namespace,type,reason&_msg_field=message&_time_field=date
          format            json_lines
          json_date_format  iso8601
          compress          gzip

    rbac:
      eventsAccess: true

    dashboards:
      enabled: false

    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi

    serviceMonitor:
      enabled: true