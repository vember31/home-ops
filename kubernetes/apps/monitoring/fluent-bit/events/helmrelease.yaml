---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit-events
  namespace: monitoring

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: fluent-bit
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  maxHistory: 1

  values:

    kind: Deployment
    replicaCount: 1

    config:
      service: |-
        [SERVICE]
          daemon off
          flush {{ .Values.flush }}
          log_level {{ .Values.logLevel }}
          http_server on
          http_listen 0.0.0.0
          http_port {{ .Values.metricsPort }}
          health_check on

      inputs: |-
        [INPUT]
          name              kubernetes_events
          tag               k8s_events
          kube_url          https://kubernetes.default.svc:443
          kube_ca_file      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kube_token_file   /var/run/secrets/kubernetes.io/serviceaccount/token

      filters: |-
        [FILTER]
          name    grep
          match   k8s_events
          exclude message already present on machine

      customParsers: ""

      outputs: |-
        [OUTPUT]
          name              http
          match             k8s_events
          host              victoria-logs-server.monitoring.svc.cluster.local
          port              9428
          uri               /insert/jsonline?_stream_fields=type,reason&_msg_field=message&_time_field=date
          format            json_lines
          json_date_format  iso8601
          compress          gzip

    rbac:
      eventsAccess: true

    # No need to mount host log paths for events-only collection
    volumeMounts: []
    volumes: []

    dashboards:
      enabled: false

    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi

    serviceMonitor:
      enabled: true
