---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafana-ds-blocky-postgres
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Blocky-Postgres
    type: postgres
    uid: blocky-postgres
    access: proxy
    url: postgres-18-ro.database.svc.cluster.local:5432
    user: ${BLOCKY_POSTGRES_USER}
    secureJsonData:
      password: ${BLOCKY_POSTGRES_PASS}
    jsonData:
      database: blocky
      sslmode: disable
      postgresVersion: 15000
