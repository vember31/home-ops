---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafana-ds-victoriametrics
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: VictoriaMetrics
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://vmsingle-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428
    isDefault: true
    jsonData:
      implementation: victoriametrics
