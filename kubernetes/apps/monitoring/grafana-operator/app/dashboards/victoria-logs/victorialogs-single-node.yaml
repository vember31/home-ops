---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-victorialogs-single-node
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-victoria-logs
  resyncPeriod: 30m
  # renovate: depName="VictoriaLogs - single-node"
  grafanaCom:
    id: 22084
    revision: 11
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
