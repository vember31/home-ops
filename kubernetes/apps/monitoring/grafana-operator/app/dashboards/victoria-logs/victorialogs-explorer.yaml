---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-victorialogs-explorer
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-victoria-logs
  resyncPeriod: 30m
  # forked from grafana.com: id=22759 revision=9 - check for upstream changes before merging
  url: https://raw.githubusercontent.com/vember31/home-ops/refs/heads/main/kubernetes/apps/monitoring/grafana-operator/app/dashboards/victoria-logs/victorialogs-explorer.json
  datasources:
    - inputName: DS_VICTORIALOGS
      datasourceName: VictoriaLogs
