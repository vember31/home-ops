---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-victorialogs-simple
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-victoria-logs
  resyncPeriod: 30m
  # renovate: depName="Simple VictoriaLogs"
  grafanaCom:
    id: 21550
    revision: 1
  datasources:
    - inputName: DS_LOGS
      datasourceName: VictoriaLogs
    - inputName: DS_METRICS
      datasourceName: VictoriaMetrics
