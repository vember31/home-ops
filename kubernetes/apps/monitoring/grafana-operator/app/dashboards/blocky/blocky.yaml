---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-blocky
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-blocky
  resyncPeriod: 30m
  # renovate: depName="blocky"
  grafanaCom:
    id: 13768
    revision: 7
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
    - inputName: VAR_BLOCKY_URL
      datasourceName: https:\/\/blocky.local.${SECRET_DOMAIN}
