---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-blocky
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-blocky
  resyncPeriod: 30m
  # renovate: depName="blocky"
  grafanaComDashboardId: 13768
  grafanaComRevision: 7
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
    - inputName: VAR_BLOCKY_URL
      datasourceName: https:\/\/blocky.local.${SECRET_DOMAIN}
