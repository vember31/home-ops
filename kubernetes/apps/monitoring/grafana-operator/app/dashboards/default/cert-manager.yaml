---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-cert-manager
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 30m
  grafanaCom:
    id: 11001
    revision: 1
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
