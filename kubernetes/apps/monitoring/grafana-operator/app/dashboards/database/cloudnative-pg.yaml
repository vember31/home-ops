---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-cloudnative-pg
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-database
  resyncPeriod: 30m
  url: https://raw.githubusercontent.com/vember31/home-ops/refs/heads/main/kubernetes/apps/monitoring/grafana-operator/app/dashboards/database/cloudnative-pg.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
