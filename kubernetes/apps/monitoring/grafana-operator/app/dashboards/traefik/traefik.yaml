---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-traefik
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-traefik
  resyncPeriod: 30m
  grafanaComDashboardId: 12250
  grafanaComRevision: 1
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
