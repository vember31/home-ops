kind: GrafanaDashboard
metadata:
  name: grafana-dash-kubernetes-api-server
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-kubernetes
  resyncPeriod: 30m
  # renovate: depName="Kubernetes / System / API Server"
  grafanaCom:
    id: 15761
    revision: 20
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
