apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-kubernetes-global
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-kubernetes
  resyncPeriod: 30m
  # renovate: depName="Kubernetes / Views / Global"
  grafanaCom:
    id: 15757
    revision: 43
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
