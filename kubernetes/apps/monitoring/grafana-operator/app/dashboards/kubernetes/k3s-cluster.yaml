---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-k3s-cluster
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-kubernetes
  resyncPeriod: 30m
  grafanaComDashboardId: 16450
  grafanaComRevision: 3
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
