---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-etcd
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-kubernetes
  resyncPeriod: 30m
  # renovate: depName="etcd"
  grafanaComDashboardId: 3070
  grafanaComRevision: 3
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
