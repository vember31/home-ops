kind: GrafanaDashboard
metadata:
  name: grafana-dash-fluent-bit
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-logging
  resyncPeriod: 30m
  # renovate: depName="Fluent Bit"
  grafanaCom:
    id: 7752
    revision: 9
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
