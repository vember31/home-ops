---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-unifi-insights
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-unifi
  resyncPeriod: 30m
  # renovate: depName="UniFi-Poller: Client Insights - Prometheus"
  grafanaCom:
    id: 11315
    revision: 9
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
