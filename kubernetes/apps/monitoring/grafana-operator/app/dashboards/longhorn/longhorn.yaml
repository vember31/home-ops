---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dash-longhorn
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: grafana-folder-longhorn
  resyncPeriod: 30m
  # renovate: depName="Longhorn"
  grafanaCom:
    id: 16888
    revision: 12
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
