---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls-production
  namespace: flux-system
spec:
  secretName: grafana-tls-production
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "grafana.local.${SECRET_DOMAIN}"
  dnsNames:
    - "grafana.local.${SECRET_DOMAIN}"