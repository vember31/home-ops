---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vlagent
  namespace: monitoring

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    force: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  maxHistory: 1

  values:
    remoteWrite:
      - url: http://victoria-logs-server.monitoring.svc.cluster.local:9428

    collector:
      includePodLabels: true
      includePodAnnotations: false

    podMonitor:
      enabled: true
