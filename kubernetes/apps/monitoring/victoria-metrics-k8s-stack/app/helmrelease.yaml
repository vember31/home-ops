---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics-k8s-stack
  namespace: monitoring

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
    namespace: flux-system

  install:
    timeout: 15m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  maxHistory: 1

  values:
    fullnameOverride: *app

    grafana:
      enabled: false

    defaultDashboards:
      enabled: false

    victoria-metrics-operator:
      enabled: true
      admissionWebhooks:
        enabled: false
      crds:
        cleanup:
          enabled: false
      affinity: &affinity
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      operator:
        # Keep prometheus-operator CRDs so existing ServiceMonitors/PodMonitors/PrometheusRules continue working
        disable_prometheus_converter: false
      prometheus-operator-crds:
        enabled: true

    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "30d"
        storage:
          accessModes:
            - ReadWriteOnce
          storageClassName: local-path
          resources:
            requests:
              storage: 20Gi
        affinity: *affinity
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-internal-with-errors@kubernetescrd
        hosts:
          - &vmhost victoria-metrics.local.${SECRET_DOMAIN}
        tls:
          - secretName: victoria-metrics-tls-production
            hosts:
              - *vmhost

    vmagent:
      enabled: true
      spec:
        externalLabels:
          cluster: ${CLUSTER_NAME}

    vmalert:
      enabled: true
      spec:
        datasource:
          url: http://vmsingle-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428
        notifiers:
          - url: http://alertmanager-operated.monitoring.svc.cluster.local:9093
        affinity: *affinity

    alertmanager:
      enabled: true
      spec:
        replicaCount: 2
        configSecret: alertmanager-secret
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 1Gi
        affinity: *affinity
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-internal-with-errors@kubernetescrd
        hosts:
          - &amhost alertmanager.local.${SECRET_DOMAIN}
        tls:
          - secretName: alert-manager-tls-production
            hosts:
              - *amhost

    kubeApiServer:
      enabled: true
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: https
              scheme: https
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecureSkipVerify: true
              metricRelabelConfigs:
                # Keep only apiserver-specific metrics (k3s runs all components in one
                # process so every endpoint leaks metrics from all other components)
                - action: keep
                  sourceLabels: ["__name__"]
                  regex: (aggregator_openapi|aggregator_unavailable|apiextensions_openapi|apiserver_admission|apiserver_audit|apiserver_cache|apiserver_cel|apiserver_client|apiserver_crd|apiserver_current|apiserver_envelope|apiserver_flowcontrol|apiserver_init|apiserver_kube|apiserver_longrunning|apiserver_request|apiserver_requested|apiserver_response|apiserver_selfrequest|apiserver_storage|apiserver_terminated|apiserver_tls|apiserver_watch|apiserver_webhooks|authenticated_user|authentication|disabled_metric|etcd_bookmark|etcd_lease|etcd_request|field_validation|get_token|go|grpc_client|hidden_metric|kube_apiserver|kubernetes_build|kubernetes_feature|node_authorizer|pod_security|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|serviceaccount_legacy|serviceaccount_stale|serviceaccount_valid|watch_cache|workqueue)_(.+)
                # Drop high cardinality histogram buckets
                - action: drop
                  sourceLabels: ["__name__"]
                  regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
                - action: drop
                  sourceLabels: ["__name__"]
                  regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

    kubelet:
      enabled: true
      vmScrapes:
        kubelet:
          spec:
            metricRelabelConfigs:
              # Keep only kubelet-specific metrics (k3s leaks all component metrics)
              - action: keep
                sourceLabels: ["__name__"]
                regex: "(kubelet|volume_manager|volume_operation|storage_operation|csi_operations|plugin_manager|reconstruct_volume|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|process_network|rest_client|scrape_duration|scrape_samples|scrape_series)_(.+)"
              # Drop high cardinality REST client histogram buckets
              - action: drop
                sourceLabels: ["__name__"]
                regex: rest_client_request_duration_seconds_bucket
      vmScrape:
        spec:
          relabelConfigs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            # Drop node-feature-discovery CPU feature labels to stay under
            # vmsingle's maxLabelsPerTimeseries=30 limit (NFD adds 40+ labels)
            - action: labeldrop
              regex: feature_node_kubernetes_io_.*
            - sourceLabels: [__metrics_path__]
              targetLabel: metrics_path
            - targetLabel: job
              replacement: kubelet

    # Disabled: chart creates v1 Endpoints resources which are broken on k8s v1.35+
    # These targets are scraped via VMStaticScrape resources instead
    kubeControllerManager:
      enabled: false

    kubeEtcd:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false

    kubeStateMetrics:
      enabled: true

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi

    nodeExporter:
      enabled: true

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      prometheus:
        monitor:
          enabled: false
