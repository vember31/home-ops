---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/traefik.io/ingressroute_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bookorbit-opds
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}`) && (Path(`/api/v1/opds`) || PathPrefix(`/api/v1/opds/`)) && Header(`X-Bookorbit-Secret`, `${BOOKORBIT_OPDS_SECRET}`)
      priority: 1000
      middlewares:
        - name: cloudflare-ips
          namespace: networking
        - name: bookorbit-opds-strip-secret
        - name: opds-auth
          namespace: networking
      services:
        - name: bookorbit
          port: 3000
    - kind: Rule
      match: Host(`${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}`) && (Path(`/api/v1/opds`) || PathPrefix(`/api/v1/opds/`))
      priority: 900
      middlewares:
        - name: cloudflare-ips
          namespace: networking
        - name: bookorbit-opds-failed-auth-rate-limit
        - name: bookorbit-opds-deny-basic-auth
      services:
        - name: error-pages
          namespace: networking
          port: 8080
  tls:
    secretName: bookorbit-tls-production
