---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name bookboss
  namespace: media

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false
    
  maxHistory: 1

  values:

    controllers:
      ${APP}:
        enabled: true
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1

        # Controller-specific overrides for `defaultPodOptions` keys
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: bookboss-secret

        containers:
          app:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.30@sha256:073a9e71fb731e624fe5d8f415df457685b5b3c66a613f610c3188a6c689a3db
              pullPolicy: IfNotPresent

            env:
              TZ: ${TIMEZONE}
              BOOKBOSS__LIBRARY__LIBRARY_PATH: /books/library
              BOOKBOSS__IMPORT__BOOKDROP_PATH: /books/bookdrop
              BOOKBOSS__FRONTEND__BASE_URL: https://${GATUS_SUBDOMAIN:-${APP}}.local.${SECRET_DOMAIN}
              BOOKBOSS__FRONTEND__LISTEN_PORT: &port 8080
            envFrom: *envFrom

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *name
        ports:
          http:
            port: *port

    ingress:
      app:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-internal-with-errors@kubernetescrd
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Book Management System
          gethomepage.dev/group: Media
          gethomepage.dev/icon: https://github.com/szinn/BookBoss/blob/main/assets-source/BookBoss-96x96.png?raw=true
          gethomepage.dev/name: BookBoss

        hosts:
          - host: &host ${GATUS_SUBDOMAIN:-${APP}}.local.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http

        tls: 
         - secretName: ${APP}-tls-production
           hosts:
             - *host

      opds:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-bookboss-opds-auth@kubernetescrd
        hosts:
          - host: *host
            paths:
              - path: /opds
                pathType: Prefix
                service:
                  identifier: app
                  port: http

        tls:
         - secretName: ${APP}-tls-production
           hosts:
             - *host

    persistence:

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

      books:
        enabled: true
        type: nfs
        server: ${OMV_IP}
        path: /export/media/books
        globalMounts:
          - path: /books
      
