---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: seerr-overrides-configmap
    files:
      - ./config/overrides.json
secretGenerator:
  - name: seerr-json-payload
    files:
      - jsonPayload=./config/json-payload.json
configurations:
  - ./kustomizeconfig.yaml
vars:
  - name: SEERR_JSON_PAYLOAD
    objref:
      apiVersion: v1
      kind: Secret
      name: seerr-json-payload
    fieldref:
      fieldpath: data.jsonPayload
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: enabled
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ../../../../templates/gatus/external
