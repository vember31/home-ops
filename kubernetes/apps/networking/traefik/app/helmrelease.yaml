---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  chart:
    spec:
      chart: traefik
      version: 41.0.1
      sourceRef:
        kind: HelmRepository
        name: traefik-charts
        namespace: flux-system

  interval: 15m
  timeout: 5m

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false
    
  maxHistory: 1
  
  values:
    # yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik-helm-chart/refs/heads/master/traefik/values.schema.json
    ## Create an IngressRoute for the dashboard
    ingressRoute:
      dashboard:
        enabled: false

    api:
      disableDashboardAd: true

    # Configure Traefik static configuration
    additionalArguments: 
      - "--log.level=INFO"
      - "--api.insecure=true"
      - "--serversTransport.insecureSkipVerify=true"
      - "--accesslog=true"
      - "--accesslog.fields.headers.names.X-Bookorbit-Secret=drop"

    ports:
      web:
        forwardedHeaders:
          trustedIPs: &cloudflareTrustedIPs
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        forwardedHeaders:
          trustedIPs: *cloudflareTrustedIPs
        http:
          tls:
            enabled: true
            options: "default"
      metrics:
        port: 9100
        expose: 
          default: true
          internal: false
        protocol: TCP

    service:
      enabled: true
      single: true
      type: LoadBalancer
      spec: 
        loadBalancerIP: "${TRAEFIK_IP}"
        externalTrafficPolicy: Local
        loadBalancerClass: io.cilium/bgp-control-plane 

    tlsOptions:
      default:
        minVersion: VersionTLS12
        maxVersion: VersionTLS13
        sniStrict: true

    rbac:
      enabled: true

    ingressClass:
      enabled: true
      isDefaultClass: true

    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    providers:
      kubernetesCRD:
        enabled: true
        allowExternalNameServices: true
        allowCrossNamespace: true

      kubernetesIngress:
        enabled: true
        allowExternalNameServices: true
        ingressClass: traefik
