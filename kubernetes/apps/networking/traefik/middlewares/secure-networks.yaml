---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/traefik.io/middleware_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-networks
  namespace: networking
spec:
  ipAllowList:
    sourceRange:
      - ${SECURE_CIDR}
      - ${POD_CIDR}
      - ${SERVICE_CIDR}
      - ${VPN_CIDR}