---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/longhorn.io/recurringjob_v1beta2.json
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: filesystem-trim
  namespace: storage
spec:
  cron: "0 7 * * *" #UTC
  task: "filesystem-trim"
  groups:
  - default
  retain: 1
  concurrency: 2