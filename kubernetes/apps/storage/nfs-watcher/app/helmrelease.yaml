---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nfs-watcher
  namespace: storage
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 1
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      ${APP}:
        type: daemonset
        serviceAccount:
          identifier: ${APP}
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - operator: Exists
        containers:
          app:
            image:
              repository: docker.io/alpine/kubectl
              tag: latest
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - /config/watch.sh
            env:
              NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              HOST_KUBELET_PODS: /host/var/lib/kubelet/pods
              HOME: /tmp
              WATCH_INTERVAL_SECONDS: "120"
              PROBE_TIMEOUT_SECONDS: "8"
              FAILURES_BEFORE_RESTART: "2"
              COOLDOWN_SECONDS: "900"
              SUMMARY_INTERVAL_SECONDS: "3600"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    serviceAccount:
      ${APP}: {}

    persistence:
      config:
        type: configMap
        name: nfs-watcher-configmap
        defaultMode: 0555
        globalMounts:
          - path: /config/watch.sh
            subPath: watch.sh
            readOnly: true
      kubelet-pods:
        type: hostPath
        hostPath: /var/lib/kubelet/pods
        hostPathType: Directory
        globalMounts:
          - path: /host/var/lib/kubelet/pods
            readOnly: true
            mountPropagation: HostToContainer
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
