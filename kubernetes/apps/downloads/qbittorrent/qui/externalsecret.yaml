---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name qui-secret
spec:
  secretStoreRef:
    name: gitlab-secret-store
    kind: ClusterSecretStore
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        QUI__DATABASE_ENGINE: postgres
        QUI__DATABASE_HOST: &dbHost postgres-18-rw.database.svc.cluster.local
        QUI__DATABASE_PORT: "5432"
        QUI__DATABASE_USER: &dbUser "{{ .QUI_POSTGRES_USER }}"
        QUI__DATABASE_PASSWORD: &dbPass "{{ .QUI_POSTGRES_PASS }}"
        QUI__DATABASE_NAME: &dbName qui
        QUI__SESSION_SECRET: "{{ .QUI_SESSION_SECRET }}"

        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"

  dataFrom:
    - extract:
        key: qui
    - extract:
        key: cloudnativepg
