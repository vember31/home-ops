---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name qui
  namespace: downloads

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false
    
  maxHistory: 1

  values:

    controllers:
      ${APP}:
        enabled: true
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: qui-secret

        containers:
          app:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.23.0
              pullPolicy: IfNotPresent

            env:
              TZ: ${TIMEZONE}
              QUI__CHECK_FOR_UPDATES: false
              QUI__OIDC_ENABLED: "true"
              QUI__OIDC_REDIRECT_URL: https://${GATUS_SUBDOMAIN:-${APP}}.local.${SECRET_DOMAIN}/api/auth/oidc/callback
              QUI__OIDC_DISABLE_BUILT_IN_LOGIN: "true"
              QUI__OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: qui-oidc-credentials
                    key: client_id
              QUI__OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: qui-oidc-credentials
                    key: client_secret
              QUI__OIDC_ISSUER:
                valueFrom:
                  secretKeyRef:
                    name: qui-oidc-credentials
                    key: issuer_url
            envFrom: *envFrom

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 7476
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *name
        ports:
          http:
            port: *port

    ingress:
      app:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-internal-with-errors@kubernetescrd
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: "Modern Qbittorrent UI"
          gethomepage.dev/group: Downloads
          gethomepage.dev/icon: https://user-images.githubusercontent.com/33867119/33150262-ba172c24-cfe3-11e7-8bc0-09ac1735844c.png
          gethomepage.dev/name: Qui
          gethomepage.dev/siteMonitor: http://qui.downloads.svc.cluster.local:7476

        hosts:
          - host: &host ${GATUS_SUBDOMAIN:-${APP}}.local.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

        tls: 
         - secretName: ${APP}-tls-production
           hosts:
             - *host

    persistence:

      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: nfs-omv-media
        globalMounts:
          - path: /media

      tmp:
        type: emptyDir
