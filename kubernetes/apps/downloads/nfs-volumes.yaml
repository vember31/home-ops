---
# OMV - /export/media
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-omv-media-downloads
spec:
  capacity:
    storage: 16Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=3
    - proto=tcp
    - hard
    - noatime
    - rsize=1048576
    - wsize=1048576
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: nfs-omv-media-downloads
    volumeAttributes:
      server: ${OMV_IP}
      share: /export/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-omv-media
  namespace: downloads
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nfs-omv-media-downloads
  resources:
    requests:
      storage: 16Ti
