---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vaultwarden
  namespace: security
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
  ingress:
    # Allow Traefik ingress controller
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: networking
            app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Allow vmagent metrics scraping
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # Allow DNS via kube-dns — required for FQDN policies to function.
    # The dns rule tells Cilium's proxy to learn which IPs each hostname resolves to,
    # so toFQDNs rules below can be enforced dynamically.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # Allow SMTP to Gmail (implicit TLS)
    - toFQDNs:
        - matchName: "smtp.gmail.com"
      toPorts:
        - ports:
            - port: "465"
              protocol: TCP
    # Allow Bitwarden push relay and identity (mobile notifications)
    - toFQDNs:
        - matchName: "push.bitwarden.com"
        - matchName: "identity.bitwarden.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Allow Google Drive for rclone backups
    - toFQDNs:
        - matchPattern: "*.googleapis.com"
        - matchPattern: "*.google.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
