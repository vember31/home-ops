---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd-defrag
  namespace: kube-system

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  maxHistory: 1

  values:

    defaultPodOptions:
      hostNetwork: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - { key: node-role.kubernetes.io/control-plane, effect: NoSchedule, operator: Exists }
        - { key: node-role.kubernetes.io/master, effect: NoSchedule, operator: Exists }
        - { key: node-role.kubernetes.io/etcd, effect: NoExecute, operator: Exists }
        - { key: CriticalAddonsOnly, operator: Exists }
      securityContext:
        runAsUser: 0

    controllers:
      ${APP}:
        type: cronjob
        cronjob:
          schedule: "30 23 * * *"
          timeZone: ${TIMEZONE}
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1

        containers:
          app:
            image:
              repository: ghcr.io/ahrtr/etcd-defrag
              tag: v0.39.0
            args:
              - --endpoints=https://127.0.0.1:2379
              - --cacert=/etc/etcd/tls/server-ca.crt
              - --cert=/etc/etcd/tls/server-client.crt
              - --key=/etc/etcd/tls/server-client.key
              - --cluster
              - --defrag-rule
              - "dbQuotaUsage > 0.8 || dbSize - dbSizeInUse > 50*1024*1024"
              - --move-leader
              - --wait-between-defrags=30s
              - --etcd-storage-quota-bytes=2147483648
              - --auto-disalarm
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }

    persistence:
      etcd-certs:
        type: hostPath
        hostPath: /var/lib/rancher/k3s/server/tls/etcd
        hostPathType: Directory
        globalMounts:
          - path: /etc/etcd/tls
            readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          ${APP}:
            app:
              - path: /tmp
