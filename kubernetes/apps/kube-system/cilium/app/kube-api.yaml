---
apiVersion: v1
kind: Service
metadata:
  name: kube-api
  annotations:
    lbipam.cilium.io/ips: ${K3S_LB_IP}
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/bgp-control-plane
  externalTrafficPolicy: Cluster
  selector:
    k8s-app: cilium
    cilium-api-lb: "true"
  ports:
    - port: 6443
      targetPort: 6443
