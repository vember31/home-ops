---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cilium-lb-api-cleanup
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cilium-lb-api-cleanup
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  kubectl label pods -n kube-system \
                    -l "k8s-app=cilium,cilium-lb-api=true" \
                    --field-selector "spec.nodeName!=k3s-control1,spec.nodeName!=k3s-control2,spec.nodeName!=k3s-control3,spec.nodeName!=k3s-control4,spec.nodeName!=k3s-control5" \
                    cilium-lb-api- || true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-lb-api-cleanup
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/rbac.authorization.k8s.io/role_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cilium-lb-api-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "patch"]
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/rbac.authorization.k8s.io/rolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cilium-lb-api-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cilium-lb-api-cleanup
subjects:
  - kind: ServiceAccount
    name: cilium-lb-api-cleanup
