---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name opencode
  namespace: default

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  maxHistory: 1

  values:
    defaultPodOptions:
      automountServiceAccountToken: true

    controllers:
      ${APP}:
        enabled: true
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1

        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.17.11@sha256:1809baec5bcceb111edfff49c54430e71e33d18b2de079adfc0b2282d1476b6f
              pullPolicy: IfNotPresent

            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache curl >/dev/null 2>&1
                echo "Downloading kubectl..."
                curl -sLo /usr/local/bin/kubectl -L "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x /usr/local/bin/kubectl
                echo "Downloading flux..."
                FLUX_URL=$(curl -sL https://api.github.com/repos/fluxcd/flux2/releases/latest | sed -n 's/.*"browser_download_url": "\([^"]*linux_amd64[^"]*\)".*/\1/p')
                echo "Flux URL: $FLUX_URL"
                curl -sLo /tmp/flux.tar.gz -L "$FLUX_URL"
                tar -xzf /tmp/flux.tar.gz -C /usr/local/bin/ flux
                rm /tmp/flux.tar.gz
                echo "Starting opencode..."
                exec opencode web --hostname 0.0.0.0 --port 4096

            env:
              TZ: ${TIMEZONE}
              HOME: /home/opencode

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *name
        ports:
          http:
            port: *port

    ingress:
      app:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/target: traefik.local.${SECRET_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: networking-internal-with-errors@kubernetescrd
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: AI Coding Agent
          gethomepage.dev/group: Development
          gethomepage.dev/icon: opencode
          gethomepage.dev/name: OpenCode
        hosts:
          - host: &host ${GATUS_SUBDOMAIN:-${APP}}.local.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

        tls:
         - secretName: ${APP}-tls-production
           hosts:
             - *host

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 512Mi
        retain: true
        globalMounts:
          - path: /home/opencode
