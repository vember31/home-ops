---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-18

spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
  primaryUpdateStrategy: unsupervised

  affinity:
    # Keep replicas off the same node, and exclude k3s-control2 from scheduling.
    podAntiAffinityType: required
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - k3s-control2

  storage:
    size: 20Gi
    storageClass: local-path
  
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true

  postgresql:
    extensions:
      - name: timescaledb
        image:
          reference: ghcr.io/vember31/timescaledb:2.27.1
      - name: timescaledb-toolkit
        image:
          reference: ghcr.io/vember31/timescaledb-toolkit:1.22.0
      - name: pgvector
        image:
          reference: ghcr.io/vember31/pgvector:0.8.2-pg18
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
      max_locks_per_transaction: '128'
      timescaledb.max_background_workers: '32'
      timescaledb.max_tuples_decompressed_per_dml_transaction: '0'
      timescaledb.telemetry_level: 'off'
    shared_preload_libraries:
      - timescaledb
 
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 4Gi
  
  monitoring:
    enablePodMonitor: true
  
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: postgres-18-backup

