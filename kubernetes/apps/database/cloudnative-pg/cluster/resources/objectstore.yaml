---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres-18-backup
spec:
  configuration:
    destinationPath: s3://cloudnative-pg/
    endpointURL: http://${OMV_IP}:9000
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: minio-access-key-id
      secretAccessKey:
        name: cloudnative-pg-secret
        key: minio-secret-access-key
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
  retentionPolicy: "30d"
