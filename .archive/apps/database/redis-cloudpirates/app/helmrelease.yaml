---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: database

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: cloudpirates-redis
    namespace: flux-system

  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace

  test:
    enable: true

  rollback:
    recreate: true
    force: true
    cleanupOnFail: true

  uninstall:
    keepHistory: false
    
  maxHistory: 1

  values:
    architecture: replication
    replicaCount: 5
    auth:
      enabled: false
      sentinel: false
    persistence:
      enabled: false
    sentinel:
      enabled: true
      masterName: redis-master
      downAfterMilliseconds: 10000
      livenessProbe:
        periodSeconds: 60
        timeoutSeconds: 15
        initialDelaySeconds: 60